name: test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Babashka
        uses: DeLaGuardo/setup-clojure@13.0
        with:
          bb: latest

      - name: Run tests
        run: bb test
